networks:
  proxy:
    external: true

services:
  netboot:
    image: ghcr.io/netbootxyz/netbootxyz:0.7.6-nbxyz18@sha256:bfe21f85fcb9cc7e76b77fafcfb23c3c3ee6d06b27ef066d61ec1de04c2cca78
    networks:
      - proxy
    environment:
      PUID: 1000
      PGID: 1000
    volumes:
      - ./data/config:/config
      - ./data/assets:/assets
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.netboot.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.netboot.rule=Host(`${SERVICE2_SUBDOMAIN:-local.boot}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.netboot.service=netboot"
      - "traefik.http.routers.netboot.tls=true"
      - "traefik.http.routers.netboot.tls.certresolver=letsencrypt"
      - "traefik.http.services.netboot.loadbalancer.server.port=3000"
      - "traefik.http.routers.netboot-endpoint.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.netboot-endpoint.rule=Host(`${SERVICE_SUBDOMAIN:-boot}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.netboot-endpoint.service=netboot-endpoint"
      - "traefik.http.routers.netboot-endpoint.tls=true"
      - "traefik.http.services.netboot-endpoint.loadbalancer.server.port=80"
    restart: unless-stopped
    ports:
      - 69:69/udp
