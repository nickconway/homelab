networks:
  proxy:
    external: true

services:
  dockge:
    image: louislam/dockge:1.5.0@sha256:335c6368b880ecc203236ed89e6e5232e0d6578e8ef5920e4a502390451502bf
    restart: unless-stopped
    # ports:
    #   - 5004:5001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      # Stacks Directory
      - ${PWD}/..:/stacks
    networks:
      - proxy
    environment:
      # Tell Dockge where to find the stacks
      - DOCKGE_STACKS_DIR=/stacks
      - PUID=1000
      - PGID=1000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dockge.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.dockge.rule=Host(`${SERVICE_SUBDOMAIN:-containers}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.dockge.tls=true"
      - "traefik.http.services.dockge.loadbalancer.server.port=5001"
