services:
    diun:
        image: ghcr.io/crazy-max/diun:4.31.0@sha256:3e277cd1f1262fe6ff1047e5550f6f2e1c860c3c60b0058625e3c69888a4cc8d
        command: serve
        volumes:
            - "./data/db:/data"
            - "./data/diun.yml:/diun.yml"
            - "/var/run/docker.sock:/var/run/docker.sock"
        environment:
            - "TZ=America/New_York"
        restart: unless-stopped
