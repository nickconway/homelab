networks:
  proxy:
    external: true

services:
  sabnzbd:
    image: linuxserver/sabnzbd:4.5.5@sha256:e4573bab787c2ba9a9e6bbf5535da0bd9d4de8e247ac7fad6428319fadd2331d
    networks:
      - proxy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./data/config:/config
      - /mnt/nas/content/usenet:/data/usenet
    # ports:
    #   - 8080:8080
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sabnzbd.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.sabnzbd.rule=Host(`${SERVICE_SUBDOMAIN:-use}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.sabnzbd.tls=true"
      - "traefik.http.services.sabnzbd.loadbalancer.server.port=8080"
