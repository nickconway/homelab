networks:
  proxy:
    external: true

services:
  socrates:
    image: ghcr.io/dougburks/so-crates:2.0.0@sha256:ecd635c6de2b88986f3c2534c733b4cec9eeede35c34edfcd0e507fc30350039
    networks:
      - proxy
    volumes:
      - ./data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.socrates.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.socrates.rule=Host(`${SERVICE_SUBDOMAIN:-pcap}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.socrates.tls=true"
      - "traefik.http.services.socrates.loadbalancer.server.port=8000"
    restart: unless-stopped
