networks:
  proxy:
    external: true

services:
  nginx:
    image: nginx:1.31.2@sha256:b5a9a3cfc86b81dd6f1458d53f2ad2b559cc255653d2efd6cacee5636bf2066f
    networks:
      - proxy
    environment:
      PUID: 1000
      PGID: 1000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nginx.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.nginx.rule=Host(`${SERVICE_SUBDOMAIN:-nginx}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.nginx.tls=true"
      - "traefik.http.services.nginx.loadbalancer.server.port=80"
    restart: unless-stopped
