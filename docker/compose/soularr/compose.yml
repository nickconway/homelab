networks:
  proxy:
    external: true

services:
  soularr:
    image: mrusse08/soularr:v1.1.0@sha256:06e4829433b5c6f4cc08fef10c70d90973b48c4c3dc0207679b7e80e63f574aa
    restart: unless-stopped
    hostname: soularr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SCRIPT_INTERVAL=21600
    user: "1000:1000"
    networks:
      - proxy
    volumes:
      - /mnt/nas/content/media/music:/downloads:ro
      - ./config:/data

  soularr-dashboard:
    build:
      context: ./dashboard/dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    user: 1000:1000
    ports:
      - 8080:8080
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./dashboard/dashboard:/app
      - ./config:/data
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
