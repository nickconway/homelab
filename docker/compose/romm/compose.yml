networks:
  proxy:
    external: true
  romm:
    name: romm

services:
  romm:
    image: rommapp/romm:5.0.0@sha256:91f6611eca5a4dafc4f4a1d72a1ed7dd66a11375d939f28410dc1d1de0b80b1b
    restart: unless-stopped
    networks:
      - proxy
      - romm
    environment:
      - PUID=1000
      - PGID=1000
      - DB_HOST=romm-mariadb
      - DB_NAME=romm # Should match MYSQL_DATABASE in mariadb
      - DB_USER=romm-user # Should match MYSQL_USER in mariadb
      - DB_PASSWD=${MARIADB_PASSWORD}
      - ROMM_AUTH_SECRET_KEY
      - IGDB_CLIENT_ID
      - IGDB_CLIENT_SECRET
      - MOBYGAMES_API_KEY= # https://www.mobygames.com/info/api/
      - STEAMGRIDDB_API_KEY
    volumes:
      - ./data/resources:/romm/resources # Resources fetched from IGDB (covers, screenshots, etc.)
      - ./data/cache:/redis-data # Cached data for background tasks
      - ./data/assets:/romm/assets # Uploaded saves, states, etc.
      - ./config:/romm/config # Path where config.yml is stored
      - ${ROM_DIR}:/romm/library/roms # Your game library
    depends_on:
      - romm-mariadb
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.romm.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.romm.rule=Host(`${SERVICE_SUBDOMAIN:-emulation}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.romm.tls=true"
      - "traefik.http.services.romm.loadbalancer.server.port=8080"

  romm-mariadb:
    image: mariadb:12.3.2@sha256:628f228f0fd5913a220438693576b29b6fe4dc1fa0a1298c0e98579fae28635f
    restart: unless-stopped
    networks:
      - romm
    environment:
      - MARIADB_ROOT_PASSWORD
      - MARIADB_DATABASE=romm
      - MARIADB_USER=romm-user
      - MARIADB_PASSWORD
    volumes:
      - ./data/db:/var/lib/mysql
