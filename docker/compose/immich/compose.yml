networks:
  proxy:
    external: true
  immich:
    name: immich

services:
  immich:
    image: ghcr.io/immich-app/immich-server:v3.0.1@sha256:46dedfc5848f7313bd6b584ea9f2648057430307aad6de56de968f6710a72cae
    volumes:
      - ./data/uploads:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
      - ${EXTERNAL_PATH_PICTURES}:/usr/src/app/external/Pictures:ro
      - ${EXTERNAL_PATH_VIDEOS}:/usr/src/app/external/Videos:ro
    env_file: .env
    extends:
      file: hwaccel.transcoding.yml
      service: quicksync # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
    depends_on:
      - immich-redis
      - immich-postgres
    restart: unless-stopped
    networks:
      - proxy
      - immich
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich.middlewares=crowdsec-traefik-bouncer"
      - "traefik.http.routers.immich.rule=Host(`${SERVICE_SUBDOMAIN:-photos}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.immich.tls=true"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"

  immich-machine-learning:
    # For hardware acceleration, add one of -[armnn, cuda, openvino] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:v3.0.1@sha256:cb2128c5cbc554fdaa2a036fb4419c808a9f3e0f27170e569dd9e727243da909
    user: 0:106
    extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
      file: hwaccel.ml.yml
      service: cpu # set to one of [armnn, cuda, openvino, openvino-wsl] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    env_file: .env
    volumes:
      - ./data/model-cache:/cache
    networks:
      - immich
    restart: unless-stopped

  immich-redis:
    image: valkey/valkey:9.1.0@sha256:8e8d64b405ce18f41b8e5ee20aa4687a8ed0022d1298f2ce31cdcf3a76e09411
    restart: unless-stopped
    networks:
      - immich

  immich-postgres:
    image: ghcr.io/immich-app/postgres:16-vectorchord0.4.3-pgvectors0.2.0@sha256:1a078b237c1d9b420b0ee59147386b4aa60d3a07a8e6a402fc84a57e41b043a4
    networks:
      - immich
    env_file: .env
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    restart: unless-stopped

  immich-power-tools:
    image: ghcr.io/immich-power-tools/immich-power-tools:0.21.1@sha256:b00aedf04e7c9c848ec37fb2608ac679dee10a58c14a7910d22f9134f981da4b
    restart: unless-stopped
    env_file: .env
    environment:
      HOSTNAME: '0.0.0.0'
    ports:
      - 3082:3000
    networks:
      - immich
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich-power-tools.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.immich-power-tools.rule=Host(`${SERVICE2_SUBDOMAIN:-tools.photos}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.immich-power-tools.tls=true"
      - "traefik.http.routers.immich-power-tools.tls.certresolver=letsencrypt"
      - "traefik.http.services.immich-power-tools.loadbalancer.server.port=3000"
