networks:
  proxy:
    external: true

services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.33.1@sha256:a4a5841bba093d81e5f4ad1eaedb4da3fda6dbb2528c552349da50ad1f7ae708
    volumes:
      - /mnt/nas/content/media/books:/audiobooks
      - /mnt/nas/content/media/podcasts:/podcasts
      - /mnt/nas/content/media/manga:/manga
      - ./data/config:/config
      - ./data/metadata:/metadata
    networks:
      - proxy
    environment:
      - TZ=America/New_York
      - PUID=1000
      - PGID=1000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.audiobookshelf.middlewares=crowdsec-traefik-bouncer"
      - "traefik.http.routers.audiobookshelf.rule=Host(`${SERVICE_SUBDOMAIN:-audio}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.audiobookshelf.tls=true"
      - "traefik.http.services.audiobookshelf.loadbalancer.server.port=80"
    restart: unless-stopped
