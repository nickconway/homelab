        image: renovate/renovate:43.263.0@sha256:5f7422addaf131c3745cb3f30630dc29bf01710de409e496a637379797f0ad21
        environment:
          - LOG_LEVEL=debug
          - RENOVATE_CONFIG_FILE=/config.js
          - RENOVATE_TOKEN=$RENOVATE_TOKEN
          - RENOVATE_REPOSITORIES=$RENOVATE_REPOSITORIES
          - SERVICES_BASE_DOMAIN=$SERVICES_BASE_DOMAIN
        volumes:
          - ./config/config.js:/config.js
