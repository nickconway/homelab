networks:
  proxy:
    external: true

services:
  prometheus:
    image: prom/prometheus:v3.13.1@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893
    networks:
      - proxy
    user: 1000:1000
    environment:
      PUID: 1000
      PGID: 1000
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    labels:
      - traefik.enable=true
      - traefik.http.routers.prometheus.middlewares=crowdsec-traefik-bouncer,auth
      - traefik.http.routers.prometheus.rule=Host(`${SERVICE_SUBDOMAIN:-prometheus}.${SERVICES_BASE_DOMAIN}`)
      - traefik.http.routers.prometheus.tls=true
      - traefik.http.services.prometheus.loadbalancer.server.port=9090
    restart: unless-stopped
