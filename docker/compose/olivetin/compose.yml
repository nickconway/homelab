networks:
  proxy:
    external: true

services:
  olivetin:
    image: jamesread/olivetin:3000.17.2@sha256:bb603fbf82010b771622f2522eccb91a66257bf650e5cd2f34d4a5271e1f7c95
    networks:
      - proxy
    volumes:
      - ./config/:/config/ # replace host path or volume as needed
      - ./data/ssh/:/home/olivetin/.ssh
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.olivetin.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.olivetin.rule=Host(`${SERVICE_SUBDOMAIN:-run}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.olivetin.tls=true"
      - "traefik.http.services.olivetin.loadbalancer.server.port=1337"
    restart: unless-stopped
