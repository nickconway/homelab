networks:
  proxy:
    external: true
  matrix:
    name: matrix

services:
  matrix-postgres:
    image: postgres:15.18-alpine3.23@sha256:3889f6e66267065437b17a404058a6220d9080c73b701edd225770f8b2d6a52c
    restart: unless-stopped
    volumes:
      - ./data/db:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: dendrite
      POSTGRES_DATABASE: dendrite
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dendrite"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - matrix

  matrix:
    image: matrixdotorg/dendrite-monolith:v0.15.2@sha256:7dafe6edfc8cfab758a68a4cf20414df1ade4a36b45b1852554d81fb70b1272c
    hostname: monolith
    volumes:
      - ./data/config:/etc/dendrite
      - ./data/media:/var/dendrite/media
      - ./data/jetstream:/var/dendrite/jetstream
      - ./data/search-index:/var/dendrite/searchindex
      - ./data/log:/var/dendrite/log
    depends_on:
      matrix-postgres:
        condition: service_healthy
    networks:
      - matrix
    restart: unless-stopped

  matrix-nginx:
    image: nginx:1.31.3@sha256:5a88c9c45479443d7be2eadc894b4ed0a9801bae03d97a5760ae13b5c2005942
    restart: "unless-stopped"
    networks:
      - matrix
      - proxy
    volumes:
      - ./config/nginx/dendrite.conf:/etc/nginx/conf.d/dendrite.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.matrix-nginx.middlewares=crowdsec-traefik-bouncer"
      - "traefik.http.routers.matrix-nginx.rule=Host(`${SERVICE_SUBDOMAIN:-matrix}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.services.matrix-nginx.loadbalancer.server.port=80"
