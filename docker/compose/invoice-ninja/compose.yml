networks:
  proxy:
    external: true
  invoice-ninja:
    name: invoice-ninja

services:
  invoice-ninja:
    image: invoiceninja/invoiceninja-debian:5.13.26@sha256:293ada121c633096e387fc7103b221a2c2a2aee95b8d9ef34991bf57de8f505b
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./data/app/public:/var/www/html/public
      - ./data/app/storage:/var/www/html/storage
    environment:
      - PUID=1000
      - PGID=1000
    depends_on:
      invoice-ninja-mysql:
        condition: service_healthy
      invoice-ninja-redis:
        condition: service_healthy
    networks:
      - invoice-ninja

  invoice-ninja-nginx:
    image: nginx:1.29.8@sha256:1881968aff6f7cdcc4b888c00a11f4ce241ad7ec957e0cb4a9e19e93a3ff87ea
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config/nginx:/etc/nginx/conf.d:ro
      - ./data/app/public:/var/www/html/public:ro
      - ./data/app/storage:/var/www/html/storage:ro
    depends_on:
      - invoice-ninja
    environment:
      - PUID=1000
      - PGID=1000
    networks:
      - proxy
      - invoice-ninja
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.invoice-ninja.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.invoice-ninja.rule=Host(`${SERVICE_SUBDOMAIN:-invoices}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.invoice-ninja.tls=true"
      - "traefik.http.services.invoice-ninja.loadbalancer.server.port=80"

  invoice-ninja-mysql:
    image: mysql:8.4.10@sha256:d36d39a64cd12a5c1cc9e6aa2bfb5f8d4c81a2f6586e0a04a9ae13939db02209
    restart: unless-stopped
    env_file: .env
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./data/db:/var/lib/mysql
    networks:
      - invoice-ninja
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u${MYSQL_USER}",
          "-p${MYSQL_PASSWORD}",
        ]

  invoice-ninja-redis:
    image: redis:8.6.2-alpine@sha256:c5e375abb885e6b2021c0377879e4890bf76f9065b8922ffc113f2b226b9fc17
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    networks:
        - invoice-ninja
