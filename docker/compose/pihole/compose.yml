networks:
  proxy:
    external: true
  pihole:
    name: pihole
    ipam:
      config:
        - subnet: 10.1.0.0/16

services:
  pihole:
    image: pihole/pihole:2026.06.0@sha256:8ea95136e7c8c15b42d88eadf1a3875421aa1be30ad39e50f661188cc986fb27
    depends_on:
      - unbound
    dns:
      - "127.0.0.1"
    ports:
      - 53:53/tcp
      - 53:53/udp
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/New_York}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.middlewares=crowdsec-traefik-bouncer,pihole-redirect@file"
      - "traefik.http.routers.pihole.rule=Host(`${SERVICE_SUBDOMAIN:-dns}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.pihole.tls=true"
      - "traefik.http.services.pihole.loadbalancer.server.port=80"
    volumes:
      - ./data/app:/etc/pihole:rw
      - ./data/dnsmasq:/etc/dnsmasq.d:rw
    restart: unless-stopped
    networks:
      proxy:
      pihole:
        ipv4_address: 10.1.1.2

  unbound:
    image: mvance/unbound:1.22.0@sha256:76906da36d1806f3387338f15dcf8b357c51ce6897fb6450d6ce010460927e90
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./data/unbound/pi-hole.conf:/opt/unbound/etc/unbound/unbound.conf.d/pi-hole.conf
    restart: unless-stopped
    networks:
      pihole:
        ipv4_address: 10.1.1.3
