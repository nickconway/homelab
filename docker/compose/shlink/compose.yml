networks:
  proxy:
    external: true
  shlink:
    name: shlink

services:
  shlink:
    image: shlinkio/shlink:5.0.1@sha256:a6d8508bc6b0eba5a28e1ee8b64dd5253434cd113c950e715baab4020edcd2a1
    networks:
      - proxy
      - shlink
    environment:
      PUID: 1000
      PGID: 1000
      DEFAULT_DOMAIN: ${SERVICE_SUBDOMAIN:-l}.${SERVICES_BASE_DOMAIN}
      IS_HTTPS_ENABLED: true
      GEOLITE_LICENSE_KEY: ${GEOLITE_LICENSE_KEY}
      DB_DRIVER: postgres
      DB_USER: shlink
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: shlink-postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.shlink.middlewares=crowdsec-traefik-bouncer"
      - "traefik.http.routers.shlink.rule=Host(`${SERVICE_SUBDOMAIN:-l}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.shlink.tls=true"
      - "traefik.http.services.shlink.loadbalancer.server.port=8080"
    restart: unless-stopped

  shlink-postgres:
    image: postgres:18.3@sha256:059fa0289cc5a184034e05a1f4f6d6fd79f69dc718b8b04ab60b6b469eed411e
    restart: unless-stopped
    volumes:
      - ./data/db:/var/lib/postgresql/data
    environment:
      PUID: 1000
      PGID: 1000
      POSTGRES_USER: shlink
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - shlink

  shlink-web-client:
    image: shlinkio/shlink-web-client:4.7.0@sha256:80b4d00c445f61e38164a4f13bea4f915b0bdc051e74705fe21ffa92a3d6fed5
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      SHLINK_SERVER_URL: https://${SERVICE_SUBDOMAIN:-l}.${SERVICES_BASE_DOMAIN}
      SHLINK_SERVER_API_KEY: ${SHLINK_SERVER_API_KEY}
    networks:
      - shlink
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.shlink-web-client.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.shlink-web-client.rule=Host(`${SERVICE2_SUBDOMAIN:-links}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.shlink-web-client.tls=true"
      - "traefik.http.services.shlink-web-client.loadbalancer.server.port=8080"
