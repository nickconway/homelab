networks:
  proxy:
    external: true

services:
  araa:
    image: docker.io/temthelem/araa-search:latest@sha256:a57b42afecf7e59e61038d578e3b4e93dd2b4a4c7c52b346bf21d33cf4811c15
    networks:
      - proxy
    env_file: .env
    environment:
      PUID: 1000
      PGID: 1000
      DOMAIN: ${DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.araa.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.araa.rule=Host(`${SERVICE_SUBDOMAIN:-search}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.araa.tls=true"
      - "traefik.http.services.araa.loadbalancer.server.port=${PORT}"
    restart: unless-stopped
