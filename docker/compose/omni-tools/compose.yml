networks:
  proxy:
    external: true

services:
  omni-tools:
    image: iib0011/omni-tools:0.6.0@sha256:ceb5acc317daf387634f7f212cefe4722fd1243ad1cba74203f25254195b6c69
    restart: unless-stopped
    networks:
      - proxy
    environment:
      PUID: 1000
      PGID: 1000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.onmi-tools.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.onmi-tools.rule=Host(`${SERVICE_SUBDOMAIN:-tools}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.onmi-tools.tls=true"
      - "traefik.http.services.onmi-tools.loadbalancer.server.port=80"
