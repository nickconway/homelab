networks:
  proxy:
    external: true

services:
  cloudflared:
    image: cloudflare/cloudflared:2026.7.1@sha256:188bb03589a32affed3cf4d0590565ffe67b78866e6b5582574afab2b705bafe
    networks:
      - proxy
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
