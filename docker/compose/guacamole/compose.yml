networks:
  proxy:
    external: true
  guacamole:
    name: guacamole

services:
  guacamole-postgres:
    image: postgres:18.3@sha256:78481659c47e862334611ccdaf7c369c986b3046da9857112f3b309114a65fb4
    volumes:
      - ./data/db:/var/lib/postgresql/data
      - ./config/postgres-init:/docker-entrypoint-initdb.d
    environment:
      PUID: 1000
      PGID: 1000
      POSTGRES_DB: guacamole
      POSTGRES_USER: guac
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    networks:
      - guacamole

  guacd:
    image: guacamole/guacd:1.6.0@sha256:8974eaa9ba32f713daf311e7cc8cd7e4cdfba1edea39eed75524e78ef4b08f4f
    user: 1000:1000
    networks:
      - guacamole
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/hack-nerd-font/:/usr/share/fonts/truetype/hack-nerd-font/
    restart: unless-stopped

  guacamole:
    image: guacamole/guacamole:1.6.0@sha256:f344085e618bb05e22b964b0208dbd06d3468275bac70206f93805245e067b40
    # user: 1000:1000
    networks:
      - guacamole
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/hack-nerd-font/:/usr/share/fonts/truetype/hack-nerd-font/
    depends_on:
      - guacd
    links:
      - guacd
    environment:
      - PUID=1000
      - PGID=1000
      - REMOTE_IP_VALUE_ENABLED=true
      - GUACD_HOSTNAME=guacd
      - GUACD_PORT=4822
      - POSTGRESQL_HOSTNAME=guacamole-postgres
      - POSTGRESQL_DATABASE=guacamole
      - POSTGRESQL_USER=guac
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD}
      - OPENID_AUTHORIZATION_ENDPOINT=https://${AUTH_SUBDOMAIN:-auth}.${SERVICES_BASE_DOMAIN}/application/o/authorize/
      - OPENID_CLIENT_ID=${OPENID_CLIENT_ID}
      - OPENID_ISSUER=https://${AUTH_SUBDOMAIN:-auth}.${SERVICES_BASE_DOMAIN}/application/o/guacamole/
      - OPENID_JWKS_ENDPOINT=https://${AUTH_SUBDOMAIN:-auth}.${SERVICES_BASE_DOMAIN}/application/o/guacamole/jwks/
      - OPENID_REDIRECT_URI=https://${SERVICE_SUBDOMAIN:-remote}.${SERVICES_BASE_DOMAIN}
      - OPENID_USERNAME_CLAIM_TYPE=preferred_username
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.guacamole.addprefix.prefix=/guacamole"
      - "traefik.http.routers.guacamole.middlewares=crowdsec-traefik-bouncer,auth,guacamole"
      - "traefik.http.routers.guacamole.rule=Host(`${SERVICE_SUBDOMAIN:-remote}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.guacamole.tls=true"
      - "traefik.http.services.guacamole.loadbalancer.server.port=8080"
    restart: unless-stopped
