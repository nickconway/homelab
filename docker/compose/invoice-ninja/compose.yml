networks:
  proxy:
    external: true
  invoice-ninja:
    name: invoice-ninja

services:
  invoice-ninja:
    image: invoiceninja/invoiceninja-debian:5.13.26@sha256:293ada121c633096e387fc7103b221a2c2a2aee95b8d9ef34991bf57de8f505b
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./data/app/public:/var/www/html/public
      - ./data/app/storage:/var/www/html/storage
    environment:
      - PUID=1000
      - PGID=1000
    depends_on:
      invoice-ninja-mysql:
        condition: service_healthy
      invoice-ninja-redis:
        condition: service_healthy
    networks:
      - invoice-ninja

  invoice-ninja-nginx:
    image: nginx:1.31.2@sha256:b5a9a3cfc86b81dd6f1458d53f2ad2b559cc255653d2efd6cacee5636bf2066f
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config/nginx:/etc/nginx/conf.d:ro
      - ./data/app/public:/var/www/html/public:ro
      - ./data/app/storage:/var/www/html/storage:ro
    depends_on:
      - invoice-ninja
    environment:
      - PUID=1000
      - PGID=1000
    networks:
      - proxy
      - invoice-ninja
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.invoice-ninja.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.invoice-ninja.rule=Host(`${SERVICE_SUBDOMAIN:-invoices}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.invoice-ninja.tls=true"
      - "traefik.http.services.invoice-ninja.loadbalancer.server.port=80"

  invoice-ninja-mysql:
    image: mysql:8.4.10@sha256:c592c15aaf4a1961e15d82eb31ea5987dda862d1c4b1e93424438c0e91dc1f8d
    restart: unless-stopped
    env_file: .env
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./data/db:/var/lib/mysql
    networks:
      - invoice-ninja
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u${MYSQL_USER}",
          "-p${MYSQL_PASSWORD}",
        ]

  invoice-ninja-redis:
    image: redis:8.8.0-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    networks:
        - invoice-ninja
