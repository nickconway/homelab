        image: renovate/renovate:43.257.4@sha256:af284cd58eab09c6532f605c12a1a81ff02b2ee4d63e945a980cdf7bd759ced7
        environment:
          - LOG_LEVEL=debug
          - RENOVATE_CONFIG_FILE=/config.js
          - RENOVATE_TOKEN=$RENOVATE_TOKEN
          - RENOVATE_REPOSITORIES=$RENOVATE_REPOSITORIES
