networks:
  proxy:
    external: true

services:
  sabnzbd:
    image: linuxserver/sabnzbd:5.0.4@sha256:3df6abbd61d82710f91997b66178405862939a4009e8db212fa4f0a7a65f2047
    networks:
      - proxy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./data/config:/config
      - /mnt/nas/content/usenet:/data/usenet
    # ports:
    #   - 8080:8080
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sabnzbd.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.sabnzbd.rule=Host(`${SERVICE_SUBDOMAIN:-use}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.sabnzbd.tls=true"
      - "traefik.http.services.sabnzbd.loadbalancer.server.port=8080"
