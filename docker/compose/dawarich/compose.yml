networks:
  proxy:
    external: true
  dawarich:
    name: dawarich

services:
  dawarich-redis:
    image: redis:8.4-alpine
    restart: unless-stopped
    command: redis-server --save 900 1 --save 300 10 --appendonly no
    networks:
      - dawarich
    volumes:
      - ./data/shared:/var/shared/redis
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  dawarich-postgres:
    image: postgis/postgis:17-3.5-alpine
    restart: unless-stopped
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - ./data/db:/var/lib/postgresql/data
      - ./data/shared:/var/shared
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf
    networks:
      - dawarich
    environment:
      POSTGRES_USER: dawarich
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: dawarich
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dawarich_development}" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  dawarich:
    image: freikin/dawarich:latest
    volumes:
      - ./data/public:/var/app/public
      - ./data/watched:/var/app/tmp/imports/watched
      - ./data/storage:/var/app/storage
      - ./data/db:/dawarich_db_data
    networks:
      - proxy
      - dawarich
    stdin_open: true
    tty: true
    entrypoint: web-entrypoint.sh
    command: ["bin/rails", "server", "-p", "3000", "-b", "::"]
    restart: unless-stopped
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://dawarich-redis:6379
      DATABASE_HOST: dawarich-postgres
      DATABASE_USERNAME: dawarich
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: dawarich
      MIN_MINUTES_SPENT_IN_CITY: 60
      APPLICATION_HOSTS: localhost,::1,127.0.0.1,${SERVICE_SUBDOMAIN:-location}.${SERVICES_BASE_DOMAIN}
      DISABLE_TELEMETRY: true
      ENABLE_TELEMETRY: false
      TIME_ZONE: America/New_York
      REVERSE_GEOCODING_ENABLED: true
      PHOTON_API_USE_HTTPS: false
      PHOTON_API_HOST: photon:2322
      DISTANCE_UNIT: mi
      SECRET_KEY_BASE: 1234567890
      RAILS_LOG_TO_STDOUT: "true"
      SELF_HOSTED: true
      STORE_GEODATA: true
      PROMETHEUS_EXPORTER_ENABLED: false
      PROMETHEUS_EXPORTER_HOST: 0.0.0.0
      PROMETHEUS_EXPORTER_PORT: 9394
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_ISSUER: https://${AUTH_SUBDOMAIN:-auth}.${SERVICES_BASE_DOMAIN}/application/o/dawarich/
      OIDC_REDIRECT_URI: https://${SERVICE_SUBDOMAIN:-location}.${SERVICES_BASE_DOMAIN}/users/auth/openid_connect/callback
      OIDC_PROVIDER_NAME: "Authentik"
      OIDC_AUTO_REGISTER: "true"
      ALLOW_EMAIL_PASSWORD_REGISTRATION: "false"
    depends_on:
      - dawarich-postgres
      - dawarich-redis
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO - http://127.0.0.1:3000/api/v1/health | grep -q '\"status\"\\s*:\\s*\"ok\"'" ]
      interval: 10s
      retries: 30
      start_period: 30s
      timeout: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dawarich.middlewares=crowdsec-traefik-bouncer"
      - "traefik.http.routers.dawarich.rule=Host(`${SERVICE_SUBDOMAIN:-location}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.dawarich.tls=true"
      - "traefik.http.services.dawarich.loadbalancer.server.port=3000"

  dawarich-sidekiq:
    image: freikin/dawarich:latest
    volumes:
      - ./data/public:/var/app/public
      - ./data/watched:/var/app/tmp/imports/watched
      - ./data/storage:/var/app/storage
    networks:
      - proxy
      - dawarich
    stdin_open: true
    tty: true
    entrypoint: sidekiq-entrypoint.sh
    command: ['sidekiq']
    restart: unless-stopped
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://dawarich-redis:6379
      DATABASE_HOST: dawarich-postgres
      DATABASE_USERNAME: dawarich
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: dawarich
      MIN_MINUTES_SPENT_IN_CITY: 60
      APPLICATION_HOSTS: localhost,::1,127.0.0.1,${SERVICE_SUBDOMAIN:-location}.${SERVICES_BASE_DOMAIN}
      DISABLE_TELEMETRY: true
      ENABLE_TELEMETRY: false
      TIME_ZONE: America/New_York
      REVERSE_GEOCODING_ENABLED: true
      PHOTON_API_USE_HTTPS: false
      PHOTON_API_HOST: photon:2322
      DISTANCE_UNIT: mi
      SECRET_KEY_BASE: 1234567890
      RAILS_LOG_TO_STDOUT: "true"
      SELF_HOSTED: true
      STORE_GEODATA: true
      PROMETHEUS_EXPORTER_ENABLED: false
      PROMETHEUS_EXPORTER_HOST: dawarich
      PROMETHEUS_EXPORTER_PORT: 9394
    depends_on:
      - dawarich-postgres
      - dawarich-redis
      - dawarich
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO - http://127.0.0.1:3000/api/v1/health | grep -q '\"status\"\\s*:\\s*\"ok\"'" ]
      interval: 10s
      retries: 30
      start_period: 30s
      timeout: 10s
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.50'
    #       memory: '2G'
