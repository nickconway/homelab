networks:
  proxy:
    external: true
  immich:
    name: immich

services:
  immich:
    image: ghcr.io/immich-app/immich-server:v2.7.5@sha256:c15bff75068effb03f4355997d03dc7e0fc58720c2b54ad6f7f10d1bc57efaa5
    volumes:
      - ./data/uploads:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
      - ${EXTERNAL_PATH_PICTURES}:/usr/src/app/external/Pictures:ro
      - ${EXTERNAL_PATH_VIDEOS}:/usr/src/app/external/Videos:ro
    env_file: .env
    extends:
      file: hwaccel.transcoding.yml
      service: quicksync # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
    depends_on:
      - immich-redis
      - immich-postgres
    restart: unless-stopped
    networks:
      - proxy
      - immich
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich.middlewares=crowdsec-traefik-bouncer"
      - "traefik.http.routers.immich.rule=Host(`${SERVICE_SUBDOMAIN:-photos}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.immich.tls=true"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"

  immich-machine-learning:
    # For hardware acceleration, add one of -[armnn, cuda, openvino] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.5@sha256:a2501141440f10516d329fdfba2c68082e19eb9ba6016c061ac80d23beadf7f3
    user: 0:106
    extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
      file: hwaccel.ml.yml
      service: cpu # set to one of [armnn, cuda, openvino, openvino-wsl] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    env_file: .env
    volumes:
      - ./data/model-cache:/cache
    networks:
      - immich
    restart: unless-stopped

  immich-redis:
    image: docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63
    restart: unless-stopped
    networks:
      - immich

  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    networks:
      - immich
    env_file: .env
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    restart: unless-stopped

  immich-power-tools:
    image: ghcr.io/varun-raj/immich-power-tools:0.21.1@sha256:b00aedf04e7c9c848ec37fb2608ac679dee10a58c14a7910d22f9134f981da4b
    restart: unless-stopped
    env_file: .env
    environment:
      HOSTNAME: '0.0.0.0'
    ports:
      - 3082:3000
    networks:
      - immich
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich-power-tools.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.immich-power-tools.rule=Host(`${SERVICE2_SUBDOMAIN:-tools.photos}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.immich-power-tools.tls=true"
      - "traefik.http.routers.immich-power-tools.tls.certresolver=letsencrypt"
      - "traefik.http.services.immich-power-tools.loadbalancer.server.port=3000"
