        image: renovate/renovate:43.265.4@sha256:96abb1a8386f21e137be23e01c756d1b9687c13237902f56471442138f4b7953
        environment:
          - LOG_LEVEL=debug
          - RENOVATE_CONFIG_FILE=/config.js
          - RENOVATE_TOKEN=$RENOVATE_TOKEN
          - RENOVATE_REPOSITORIES=$RENOVATE_REPOSITORIES
