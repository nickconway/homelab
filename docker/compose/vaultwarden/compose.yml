networks:
  proxy:
    external: true

services:
  vaultwarden:
    image: vaultwarden/server:1.36.0@sha256:d626d04934cd1192ad8ced1adb975099fca78cec33ab467d2d3c923cde7f3b0c
    networks:
      - proxy
    environment:
      - PUID=1000
      - PGID=1000
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - DOMAIN=https://${SERVICE_SUBDOMAIN:-vault}.${SERVICES_BASE_DOMAIN}
      - WEBSOCKET_ENABLED=true
      - SIGNUPS_ALLOWED=false
      - EXPERIMENTAL_CLIENT_FEATURE_FLAGS=ssh-key-vault-item,ssh-agent
      - SMTP_HOST=mail.smtp2go.com
      - SMTP_FROM=vault@${SERVICES_BASE_DOMAIN}
      - SMTP_PORT=587
      - SMTP_SSL=true
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    volumes:
      - ./data/:/data/
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.middlewares=crowdsec-traefik-bouncer"
      - "traefik.http.routers.vaultwarden.rule=Host(`${SERVICE_SUBDOMAIN:-vault}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.vaultwarden.tls=true"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
    restart: unless-stopped
