networks:
  proxy:
    external: true
  ghost:
    name: ghost

services:
  ghost:
    image: ghost:6.28.0-alpine3.23@sha256:0208a517fa6545e3621674a9c888796bb13a0b34aeba89f3201e7aa944bac8f4
    environment:
      PUID: 1000
      PGID: 1000
      # see https://ghost.org/docs/config/#configuration-options
      database__client: mysql
      database__connection__host: ghost-mysql
      database__connection__user: ghost
      database__connection__password: ${MYSQL_ROOT_PASSWORD}
      database__connection__database: ghost
      # this url value is just an example, and is likely wrong for your environment!
      url: https://${SERVICE_SUBDOMAIN:-blog}.${SERVICES_BASE_DOMAIN}
      # contrary to the default mentioned in the linked documentation, this image defaults to NODE_ENV=production (so development mode needs to be explicitly specified if desired)
      #NODE_ENV: development
    volumes:
      - ./data/content:/var/lib/ghost/content
    networks:
      - proxy
      - ghost
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ghost.middlewares=crowdsec-traefik-bouncer"
      - "traefik.http.routers.ghost.rule=Host(`${SERVICE_SUBDOMAIN:-blog}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.ghost.tls=true"
      - "traefik.http.services.ghost.loadbalancer.server.port=2368"
    restart: unless-stopped

  ghost-mysql:
    image: mysql:9.7.0@sha256:c9e48b0c008f1936d4139d1c0dcd5950a9dbe57d4d40f383013cde432fa6d6aa
    restart: unless-stopped
    networks:
      - ghost
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ghost
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ghost
      PUID: 1000
      PGID: 1000
    volumes:
      - ./data/db:/var/lib/mysql
