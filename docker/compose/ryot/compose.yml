networks:
  proxy:
    external: true
  ryot:
    name: ryot

services:
  ryot-postgres:
    image: postgres:18.3-alpine3.23@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
    restart: unless-stopped
    volumes:
      - ./data/db:/var/lib/postgresql/data
    environment:
      - PUID=1000
      - PGID=1000
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=ryot
      - POSTGRES_DB=ryot
    networks:
      - ryot

  ryot:
    image: ghcr.io/ignisda/ryot:v10.3.8@sha256:179f153c58a52c87c2a28c7bfe21bd4a510fb387c55bf2b4fff7f08bc12c69c2
    environment:
      - DATABASE_URL=postgres://ryot:${POSTGRES_PASSWORD}@ryot-postgres:5432/postgres
      - TZ=America/New_York
      - SERVER_ADMIN_ACCESS_TOKEN=${SERVER_ADMIN_ACCESS_TOKEN}
    restart: unless-stopped
    networks:
      - ryot
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ryot.middlewares=crowdsec-traefik-bouncer,auth"
      - "traefik.http.routers.ryot.rule=Host(`${SERVICE_SUBDOMAIN:-statistics}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.ryot.tls=true"
      - "traefik.http.services.ryot.loadbalancer.server.port=8000"
