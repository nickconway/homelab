networks:
  proxy:
    external: true

services:
  jellyfin:
    image: jellyfin/jellyfin:10.11.11@sha256:aefb67e6a7ff1debdd154a78a7bbb780fd0c873d8639210a7f6a2016ad2b35db
    user: 0:106
    networks:
      - proxy
    devices:
      - /dev/dri/:/dev/dri/
    environment:
      PUID: 1000
      PGID: 1000
      JELLYFIN_PublishedServerUrl: https://${SERVICE_SUBDOMAIN:-watch}.${SERVICES_BASE_DOMAIN}
    group_add:
      - 107
      - 44
    volumes:
      - ./data/config:/config
      - ./data/cache:/cache
      - /mnt/nas/content/media:/data/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.middlewares=crowdsec-traefik-bouncer"
      - "traefik.http.routers.jellyfin.rule=Host(`${SERVICE_SUBDOMAIN:-watch}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
    restart: unless-stopped
