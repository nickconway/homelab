networks:
  komodo:
    name: komodo
  komodo-database:
    name: komodo-database
  proxy:
    external: true

services:
  postgres:
    image: ghcr.io/ferretdb/postgres-documentdb:17-0.107.0-ferretdb-2.7.0@sha256:2386795ec2aa7ae559304361979f1dc5708d383ee9020ae63dadc2940dfe58f7
    restart: unless-stopped
    logging:
      driver: local
    networks:
      - komodo-database
    volumes:
      - ./data/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=postgres
    labels:
      - "komodo.skip=true"

  ferretdb:
    image: ghcr.io/ferretdb/ferretdb:2.7.0@sha256:5706414241eb84f0515512c37b46db0f1b1eac9e5ceb7e4c2523211c184b1985
    restart: unless-stopped
    depends_on:
      - postgres
    logging:
      driver: local
    volumes:
      - ./data/state:/state
    networks:
      - komodo
      - komodo-database
    environment:
      - FERRETDB_POSTGRESQL_URL=postgres://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/postgres
    labels:
      - "komodo.skip=true"

  core:
    image: ghcr.io/moghtech/komodo-core:2.2.0@sha256:7afbcfa99674bf3f51539ec3aa7235795e9b994af9b7099a6c4c654d5d8a5b6b
    init: true
    restart: unless-stopped
    depends_on:
      - ferretdb
    logging:
      driver: local
    networks:
      - proxy
      - komodo
    volumes:
      - ${PROJECT_DIR}:/repo-cache
      - ./data/keys:/config/keys
    env_file: .env
    environment:
      KOMODO_DATABASE_ADDRESS: ferretdb:27017
      KOMODO_DATABASE_USERNAME: ${DB_USERNAME}
      KOMODO_DATABASE_PASSWORD: ${DB_PASSWORD}
    labels:
      - "komodo.skip=true"
      - "traefik.enable=true"
      - "traefik.http.routers.komodo.middlewares=crowdsec-traefik-bouncer"
      - "traefik.http.routers.komodo.rule=Host(`${SERVICE_SUBDOMAIN:-deploy}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.komodo.tls=true"
      - "traefik.http.services.komodo.loadbalancer.server.port=9120"