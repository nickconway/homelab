networks:
  proxy:
    external: true
  gitea:
    name: gitea

services:
  opengist:
    image: ghcr.io/thomiceli/opengist:1.12.1@sha256:85361da4c2f259df6e0675c54574c991ae2601922cb56c4d0419fd3e15ceb139
    restart: unless-stopped
    networks:
      - proxy
      - gitea
    ports:
      - 2222:2222
    volumes:
      - ./data/gist:/opengist
      - ./data/gist-config.yml:/config.yml
    environment:
      UID: 1000
      GID: 1000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.opengist.middlewares=crowdsec-traefik-bouncer"
      - "traefik.http.routers.opengist.rule=Host(`${SERVICE2_SUBDOMAIN:-gist}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.opengist.tls=true"
      - "traefik.http.services.opengist.loadbalancer.server.port=6157"

  gitea:
    image: gitea/gitea:1.27.0@sha256:7dff60d7ea6df9d0bdf78971cdb1350e9b7df3fda5f115c77afe12122887bd64
    ports:
      - 222:22
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=gitea-postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=${POSTGRES_PASSWORD}
    restart: unless-stopped
    networks:
      - proxy
      - gitea
    volumes:
      - ./data/app:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - gitea-postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gitea.middlewares=crowdsec-traefik-bouncer"
      - "traefik.http.routers.gitea.rule=Host(`${GIT_SUBDOMAIN:-git}.${SERVICES_BASE_DOMAIN}`)"
      - "traefik.http.routers.gitea.tls=true"
      - "traefik.http.services.gitea.loadbalancer.server.port=3000"

  gitea-runner:
    image: gitea/act_runner:0.6.1@sha256:b5c35d6bdbb9bb25e531230bfc7cc663cb751406cbec90a2a891b85fea54de86
    restart: unless-stopped
    volumes:
      - ./data/runner/config.yaml:/config.yaml
      - ./data/runner/data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gitea
    environment:
      - GITEA_INSTANCE_URL=https://${SERVICE_SUBDOMAIN:-git}.${SERVICES_BASE_DOMAIN}
      - GITEA_RUNNER_REGISTRATION_TOKEN=${GITEA_RUNNER_REGISTRATION_TOKEN}
      - GITEA_RUNNER_NAME=Runner
      - USER_UID=1000
      - USER_GID=1000

  gitea-postgres:
    image: postgres:18.4@sha256:3a82e1f56c8f0f5616a11103ac3d47e632c3938698946a7ad26da0df1334744a
    restart: unless-stopped
    volumes:
      - ./data/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=gitea
      - POSTGRES_USER=gitea
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - gitea
